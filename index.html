<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Chamado de Impressora</title>

<link rel="stylesheet" href="style.css">

</head>

<body>

<div class="container">

<h2>Abrir chamado para impressora</h2>

<form id="formChamado">

<label>OS</label>
<input type="text" id="os" placeholder="Número da OS">

<label>Setor</label>
<select id="setor">

<option value="">SELECIONE O SETOR</option>

<option>AGEPLANDI</option>
<option>AGIN</option>
<option>ASCOM</option>
<option>AUDIN</option>
<option>BPTRAN</option>
<option>CAEX</option>
<option>CAJI</option>
<option>CEDOC</option>
<option>CEDOP</option>
<option>CEMEP</option>
<option>CETRAN</option>
<option>CODEX</option>
<option>CODEX TEORICO</option>
<option>COET</option>
<option>COPROC</option>
<option>CPL</option>
<option>CRT</option>
<option>DIRAC</option>
<option>DIRAF</option>
<option>DIROP</option>
<option>GEARHB</option>
<option>GEAUX</option>
<option>GERSEC</option>
<option>GEOF</option>
<option>GRAVAMES</option>
<option>NUAVE</option>
<option>OUVIDORIA</option>
<option>PRATICO</option>
<option>PRESIDENCIA</option>
<option>PROTOCOLO</option>
<option>PROJUR</option>
<option>RH</option>
<option>SETAI</option>
<option>SETAC</option>
<option>SETAD</option>

</select>

<label>Local</label>
<select id="local">

<option>Sede</option>
<option>ESTANCIA</option>
<option>LAGARTO</option>
<option>PARQUE SHOPPING</option>
<option>RIOMAR</option>
<option>TOBIAS BARRETO</option>

</select>

<label>Modelo da Impressora</label>
<select id="modelo">

<option value="">Selecione a impressora</option>
<option>HP LaserJet M428</option>
<option>HP LaserJet M404</option>
<option>HP LaserJet P1102</option>
<option>Brother DCP-L2540DW</option>
<option>Brother HL-L2320D</option>
<option>Epson L3150</option>

</select>

<label>Problema</label>
<select id="problema">

<option value="">SELECIONE O PROBLEMA</option>
<option>QUEIMADA</option>
<option>QUEBRADA</option>
<option>PRENDENDO PAPEL</option>
<option>CILINDRO</option>
<option>MANCHANDO PAPEL</option>
<option>FAZENDO BARULHO</option>
<option>TAMPA QUEBRADA</option>
<option>MANCHANDO PAPEL NA CÓPIA</option>

</select>

<label>Tecnico</label>

<select id="tecnico">
<option value="">Selecione o técnico</option>

<option>ANDERSON</option>
<option>ANDREZA</option>
<option>EDUARDO</option>
<option>GUILHERME</option>
<option>JEFERSON</option>
<option>OTAVIO</option>
<option>RAFAELLA</option>
<option>REINALDO</option>
<option>YURE</option>

</select>

<button type="button" onclick="enviarWhatsapp()">
Enviar para Casa da Cópia
</button>

</form>

<footer>
Sistema de Chamado de Impressoras
</footer>

</div>

<script src="script.js"></script>

</body>
</html>
